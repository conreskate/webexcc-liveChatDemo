<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Webex Contact Center Demo</title>
<style>
* {
    box-sizing: border-box;
}
body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: #f5f5f5;
}
    
/* ===========================
   LOGIN SCREEN
=========================== */
    
#loginScreen {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: #eeeeee;
}
.loginBox {
    background: white;
    width: 340px;
    padding: 30px;
    border-radius: 8px;
    box-shadow:
        0 4px 15px rgba(0,0,0,.25);
    text-align: center;
}
.loginBox input {
    width: 100%;
    padding: 12px;
    margin: 15px 0;
    font-size: 16px;
}
.loginBox button {
    width:100%;
    padding:12px;
    font-size:16px;
    cursor:pointer;
}
#error {
    color:red;
    margin-top:15px;
}
    
/* ===========================
   MAIN DEMO PAGE
=========================== */
    
#mainContent {
    display:none;
    min-height:100vh;
}
/* Header */
.header {
    height:90px;
    background:#ffffff;
    display:flex;
    align-items:center;
    padding-left:40px;
    box-shadow:
        0 2px 5px rgba(0,0,0,.15);
    position:relative;
    z-index:10;
}
.header h1 {
    margin:0;
    color:#1b4f72;
    font-size:32px;
}
/* Image area */
.heroImage {
    height:calc(100vh - 90px);
    background-image:url("background.jpg");
    background-size:cover;
    background-position:center top;
    background-repeat:no-repeat;
}
/* Optional overlay text */
.heroOverlay {
    padding:40px;
    color:white;
    text-shadow:
        1px 1px 4px black;
}
</style>
</head>
<body>
    
<!-- =========================== -->
<!--        LOGIN PAGE           -->
<!-- =========================== -->
    
<div id="loginScreen">
    <div class="loginBox">
        <h2>
            Demo Access
        </h2>
        <p>
            Enter the password to continue.
        </p>
        <input
            id="password"
            type="password"
            placeholder="Password"
            onkeydown="if(event.key==='Enter')checkPassword();"
        >
        <button onclick="checkPassword()">
            Enter
        </button>
        <div id="error"></div>
    </div>
</div>
    
<!-- =========================== -->
<!--         MAIN PAGE           -->
<!-- =========================== -->
    
<div id="mainContent">
    <div class="header">
        <h1>
            Webex Contact Center Demo
        </h1>
    </div>
    <div class="heroImage">

<script>
const PASSWORD = "Demo123!";
function checkPassword(){
    const entered =
        document.getElementById("password").value;
    if(entered === PASSWORD){
        document.getElementById("loginScreen").style.display="none";
        document.getElementById("mainContent").style.display="block";
    }
    else{
        document.getElementById("error").innerHTML =
            "Incorrect password.";
    }
}
</script>
