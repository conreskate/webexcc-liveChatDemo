<!DOCTYPE html>
<html lang="en">
<head>

    <title>Webex Live Chat Demo</title>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
            background: #f5f5f5;
        }

        #loginScreen {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .loginBox {
            background: white;
            padding: 30px;
            border-radius: 8px;
            width: 320px;
            box-shadow: 0 3px 12px rgba(0,0,0,.2);
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 15px 0;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 10px;
            cursor: pointer;
        }

        #mainContent {
            display: none;
            padding: 40px;
        }

        .error {
            color: red;
            margin-top: 10px;
        }
    </style>
</head>

        <p>Please enter the password.</p>

        <input

            id="password"
            placeholder="Password"
            onkeydown="if(event.key==='Enter') checkPassword();">

        <button onclick="checkPassword()">
            Enter
        </button>

        <div class="error" id="error"></div>
    </div>
</div>
